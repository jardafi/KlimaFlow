<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Orange background -->
  <rect width="32" height="32" rx="3" fill="#FF6B35"/>
  <!-- Border/shadow feel -->
  <rect width="32" height="32" rx="3" fill="none" stroke="#0F292F" stroke-width="0.5" opacity="0.3"/>
  <!-- AC snowflake symbol -->
  <!-- Vertical bar -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Horizontal bar -->
  <line x1="5" y1="16" x2="27" y2="16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Diagonal left -->
  <line x1="8.5" y1="8.5" x2="23.5" y2="23.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Diagonal right -->
  <line x1="23.5" y1="8.5" x2="8.5" y2="23.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="#0F292F"/>
  <!-- Branch tips on vertical -->
  <line x1="13" y1="8" x2="16" y2="5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="8" x2="16" y2="5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="24" x2="16" y2="27" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="24" x2="16" y2="27" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
